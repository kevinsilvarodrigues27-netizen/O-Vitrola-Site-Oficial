    <!-- Seção 1 -->

    </section>

    <!-- Seção 2 -->
    <section class="secao" id="secao2">
        <div class="videos-container">
            <video autoplay muted loop playsinline>
                <source src="Video-Background/Video-Vitrola-2.mp4" type="video/mp4">
            </video>
            <video autoplay muted loop playsinline>
                <source src="Video-Background/Video-Vitrola-2.2.mp4" type="video/mp4">

        <div class="sobre">
            <img src="proximos-shows.png" alt="Próximos Shows" class="img-shows">

    <!-- Seção 3 -->
    <section class="secao" id="secao3">

    </footer>

    <!-- SCRIPT MOVIDO PARA O FINAL DO BODY (CORREÇÃO CRÍTICA) -->
    <script>
        // Esconde/mostra cabeçalho na seção 2 (só no desktop)
        document.addEventListener('DOMContentLoaded', () => {
            const headerObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const header = document.querySelector('header');
                    if (window.innerWidth > 768) {
                        if (entry.isIntersecting) {
                            header.classList.add('header-escondido');
                            document.addEventListener('mousemove', mostrarHeaderTemporario);
                        } else {
                            header.classList.remove('header-escondido');
                            document.removeEventListener('mousemove', mostrarHeaderTemporario);
                        }
                    }
                });
            }, { threshold: 0.1 });

            const secao2 = document.getElementById('secao2');
            if (secao2) headerObserver.observe(secao2);
        });

        function mostrarHeaderTemporario(e) {
            const header = document.querySelector('header');
            if (e.clientY < 120) {
                header.classList.remove('header-escondido');
            } else {
                header.classList.add('header-escondido');
            }
        }

        const URL_PLANILHA = 'https://corsproxy.io/?' + encodeURIComponent('https://docs.google.com/spreadsheets/d/e/2PACX-1vSkXuDXyf2990CfQTV_1KYb2XiicHlCAZpK9YFtfffX9ruWNkLclKi7huTKtNx2t25i2hArhqSuC_XR/pub?gid=0&single=true&output=csv');

        fetch(URL_PLANILHA)
            .then(r => r.text())
            .then(csv => {
                const linhas = csv.split('\n').slice(1);
                const lista = document.getElementById('shows-lista');
                lista.innerHTML = '';

                linhas.forEach((linha, i) => {
                    if (!linha.trim()) return;
                    const [dia, mes, local, cidade, horario] = linha.split(',');

                    const card = document.createElement('div');
                    card.className = 'show-card';
                    card.style.transitionDelay = `${i * 0.15}s`;
                    card.innerHTML = `
                        <div class="show-data">
                            <p class="show-dia">${dia.trim()}</p>
                            <p class="show-mes">${mes.trim()}</p>
                        </div>
                        <div class="show-info">
                            <p class="show-local">${local.trim()}</p>
                            <p class="show-cidade">${cidade.trim()}</p>
                        </div>
                        <p class="show-horario">${horario.trim()}</p>
                    `;
                    lista.appendChild(card);
                });

                observarCards();
            })
            .catch(() => {
                document.getElementById('shows-lista').innerHTML = '<p class="agenda-carregando">erro ao carregar shows</p>';
            });

        function animarCards() {
            const cards = document.querySelectorAll('.show-card');
            const lista = document.querySelector('.shows-lista');
            const imgShows = document.querySelector('.img-shows');

            lista.classList.remove('visivel');
            cards.forEach(c => c.classList.remove('visivel'));
            if (imgShows) imgShows.classList.remove('visivel');

            setTimeout(() => {
                lista.classList.add('visivel');
                if (imgShows) imgShows.classList.add('visivel');
                cards.forEach(c => c.classList.add('visivel'));
            }, 600);
        }

        function observarCards() {
            let dentroSecao = false;

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !dentroSecao) {
                        dentroSecao = true;
                        animarCards();
                    } else if (!entry.isIntersecting) {
                        dentroSecao = false;
                        const cards = document.querySelectorAll('.show-card');
                        const lista = document.querySelector('.shows-lista');
                        const imgShows = document.querySelector('.img-shows');
                        lista.classList.remove('visivel');
                        cards.forEach(c => c.classList.remove('visivel'));
                        if (imgShows) imgShows.classList.remove('visivel');
                    }
                });
            }, { threshold: 0.1 });

            const secao2 = document.getElementById('secao2');
            if (secao2) observer.observe(secao2);
        }

        function toggleMenu() {
            const menu = document.getElementById('menuMobile');
            menu.classList.toggle('aberto');
        }
    </script>
</body>
</html>
